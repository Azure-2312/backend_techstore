<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore – Administración</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a237e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    h1 { color: #1a237e; text-align: center; margin-bottom: 8px; font-size: 24px; }
    p.sub { color: #666; text-align: center; margin-bottom: 28px; font-size: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: bold; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 18px; outline: none; }
    input:focus { border-color: #1a237e; }
    button { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    button:hover { background: #283593; }
    .error { background: #ffebee; color: #c62828; padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏪 TechStore</h1>
    <p class="sub">Panel de Administración</p>
    {% if error %}
      <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="username" placeholder="admin" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>

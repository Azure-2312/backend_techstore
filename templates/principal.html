<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechStore – Principal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    header { background: #1a237e; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; }
    header span { font-size: 14px; opacity: 0.85; }
    header a { color: #ffeb3b; text-decoration: none; font-size: 14px; margin-left: 20px; }
    .main { max-width: 900px; margin: 60px auto; text-align: center; }
    .main h2 { font-size: 28px; color: #1a237e; margin-bottom: 12px; }
    .main p { color: #555; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 14px 32px; background: #1a237e; color: white; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; }
    .btn:hover { background: #283593; }
  </style>
</head>
<body>
  <header>
    <h1>🏪 TechStore S.A.C. – Administración</h1>
    <div>
      <span>Bienvenido, {{ usuario.nombre }}</span>
      <a href="/productos-web">Gestionar productos</a>
      <a href="/salir">Cerrar sesión</a>
    </div>
  </header>
  <div class="main">
    <h2>Panel Principal</h2>
    <p>Acceda al módulo de gestión de productos para registrar, listar y eliminar artículos del catálogo.</p>
    <a href="/productos-web" class="btn">📦 Gestionar Productos</a>
  </div>
</body>
</html>
